name: deployKit

server:
  port: 9090
  tomcat:
    connection-timeout: 1800000

logging:
  file:
    name: "${DEPLOY_PROJECT_LOG_FILE:${user.home}/.deploy-project/logs/deploy-project.log}"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

spring:
  main:
    headless: false
  mvc:
    async:
      request-timeout: 1800000

deploy:
  client:
    ui-mode: ${DEPLOY_PROJECT_UI_MODE:DOWNLOAD}
    installer-download-url: ${DEPLOY_PROJECT_INSTALLER_DOWNLOAD_URL:}
    latest-version-url: ${DEPLOY_PROJECT_LATEST_VERSION_URL:https://deploy.jinuk.dev/version.json}
  download:
    installer-path: ${DEPLOY_PROJECT_INSTALLER_PATH:}
    installer-dir: ${DEPLOY_PROJECT_INSTALLER_DIR:}
    installer-file-name: ${DEPLOY_PROJECT_INSTALLER_FILE_NAME:}
  storage:
    sites-file: ${DEPLOY_PROJECT_SITES_FILE:}

fgivpnT5008:
  iptime:
    org:
