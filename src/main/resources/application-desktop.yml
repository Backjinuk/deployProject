server:
  address: 127.0.0.1
  port: ${DEPLOY_PROJECT_PORT:0}

spring:
  main:
    headless: false
  mvc:
    async:
      request-timeout: 1800000

deploy:
  desktop:
    open-browser: true
    window-mode: ${DEPLOY_PROJECT_WINDOW_MODE:native}
  client:
    ui-mode: ${DEPLOY_PROJECT_UI_MODE:APP}
    installer-download-url: ${DEPLOY_PROJECT_INSTALLER_DOWNLOAD_URL:}
    latest-version-url: ${DEPLOY_PROJECT_LATEST_VERSION_URL:https://deploy.jinukl.dev/version.json}
  storage:
    sites-file: ${DEPLOY_PROJECT_SITES_FILE:}
